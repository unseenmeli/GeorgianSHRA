{% extends "blog/base.html" %}
{% block content %}

<style>
.coming-soon-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 50vh;
    padding: 2rem;
}

.coming-soon-box {
    text-align: center;
    background: #ffffff;
    padding: 4rem 5rem;
    border-radius: 20px;
    border: 2px solid rgba(32, 180, 185, 0.3);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.coming-soon-box h1 {
    font-size: 3rem;
    color: #20b4b9;
    margin: 0;
    font-weight: 900;
    letter-spacing: -0.5px;
}

@media (max-width: 768px) {
    .coming-soon-box {
        padding: 2rem;
    }

    .coming-soon-box h1 {
        font-size: 2rem;
    }
}
</style>

<div class="coming-soon-container">
    <div class="coming-soon-box">
        <h1 data-translation-key="comingSoon">Coming Soon</h1>
    </div>
</div>

{% endblock content %}
